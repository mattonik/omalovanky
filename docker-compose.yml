services:
  web:
    image: ghcr.io/mattonik/omalovanky:latest
    build: .
    container_name: carovne-omalovanky
    restart: unless-stopped
    ports:
      - "${OMALOVANKY_PORT:-8081}:8080"
    environment:
      APP_DB_PATH: /data/app.db
      COLORINGS_DIR: /data/colorings
      OPENAI_API_KEY: "${OPENAI_API_KEY:?Set OPENAI_API_KEY in the Compose environment}"
    volumes:
      - ${OMALOVANKY_DATA_DIR:-./data}:/data
