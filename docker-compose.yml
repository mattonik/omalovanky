services:
  web:
    image: ghcr.io/mattonik/omalovanky:latest
    build: .
    container_name: carovne-omalovanky
    restart: unless-stopped
    ports:
      - "${OMALOVANKY_PORT:-8081}:8080"
    environment:
      - APP_DB_PATH=/data/app.db
      - COLORINGS_DIR=/data/colorings
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
    volumes:
      - ${OMALOVANKY_DATA_DIR:-./data}:/data
    secrets:
      - openai_api_key

secrets:
  openai_api_key:
    file: ${OPENAI_API_KEY_FILE:-./secrets/openai_api_key}
