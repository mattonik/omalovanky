<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tlač omaľovánky</title>
    <style>
      @page {
        size: A4 {{ orientation }};
        margin: 0;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #fff;
      }

      body {
        display: grid;
        place-items: center;
      }

      img {
        display: block;
        width: 100%;
        height: 100vh;
        object-fit: contain;
      }

      @media print {
        img {
          width: 100vw;
          height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <img src="/colorings/{{ generation_id }}.png" alt="Omaľovánka pripravená na tlač" />
    <script>
      window.addEventListener("load", () => window.print());
    </script>
  </body>
</html>
