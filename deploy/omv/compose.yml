services:
  web:
    image: ghcr.io/mattonik/omalovanky:latest
    pull_policy: always
    container_name: carovne-omalovanky
    restart: unless-stopped
    ports:
      - "${OMALOVANKY_PORT:-8081}:8080"
    environment:
      APP_DB_PATH: /data/app.db
      COLORINGS_DIR: /data/colorings
      OPENAI_API_KEY: "${OPENAI_API_KEY:?Set OPENAI_API_KEY in the OMV Environment field}"
      TZ: "${TZ:-Europe/Bratislava}"
    volumes:
      - "${OMALOVANKY_DATA_DIR:-/srv/appdata/omalovanky}:/data"
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

